<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/heading.css" />
    <link rel="stylesheet" href="./styles/formData.css" />
    <link rel="stylesheet" href="./styles/bottom.css" />
    <link rel="stylesheet" href="./styles/resume.css" />
  </head>
  <body>
    <div class="formBox">
      <div class="formContainer">
        <!-- progress bar section start  -->
        <div class="progressBar">
          <div class="progress"></div>
          <h5>1</h5>
          <h5>2</h5>
          <h5>3</h5>
          <h5>Resume</h5>
        </div>
        <!-- progress bar section end  -->

        <!-- personal info section start  -->
        <div class="Info">
          <!-- type of detail page start  -->
          <div class="heading">
            <p>Perosnal Info</p>
          </div>
          <!-- type of detail page end  -->
          <div class="data">
            <label for="name">Name</label>
            <input type="text" name="name" id="name" />
          </div>
          <div class="data">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
          </div>
          <div class="data">
            <label for="contact">Contact</label>
            <input type="number" name="contact" id="contact" />
          </div>
          <div class="box">
            <label for="dob">Date of Birth</label>
            <input type="date" name="dob" id="dob" />
          </div>
        </div>
        <!-- person info section end  -->

        <!-- education section start  -->
        <div class="Info hide">
          <!-- type of detail page start  -->
          <div class="heading">
            <p>Education Info</p>
          </div>
          <!-- type of detail page end  -->

          <div class="data">
            <label for="coursename">Course Name</label>
            <input type="text" name="coursename" id="coursename" />
          </div>
          <div class="data">
            <label for="percentage"> Percentage</label>
            <input type="text" name="percentage" id="percentage" />
          </div>
        </div>
        <!-- education section end  -->

        <!-- family info section start  -->
        <div class="Info hide">
          <!-- type of detail page start  -->
          <div class="heading">
            <p>Family Info</p>
          </div>
          <!-- type of detail page end  -->

          <div class="data">
            <label for="fathername">Father Name</label>
            <input type="text" name="fathername" id="fathername" />
          </div>
          <div class="data">
            <label for="mothername">Mother Name</label>
            <input type="text" name="mothername" id="mothername" />
          </div>
        </div>
        <!-- family info section end  -->

        <div id="resume">
          <div class="personalInfo">
            <h2>Personal</h2>
            <div>
              <p>Name :</p>
              <p id="rname">fsdfsdf</p>
            </div>

            <div>
              <p>Email :</p>
              <p id="remail">dfafdasf</p>
            </div>
            <div>
              <p>Contact :</p>
              <p id="rcontact">adfas</p>
            </div>
            <div>
              <p>Dob :</p>
              <p id="rnumber">sdafas</p>
            </div>
          </div>
          <div class="education">
            <h2>Education</h2>
            <div>
              <p>CourseName :</p>
              <p id="rcoursename">fsdfsdf</p>
            </div>
            <div>
              <p>Percentage :</p>
              <p id="rpercentage">fsdfsdf</p>
            </div>
          </div>
          <div class="family">
            <h2>Family</h2>
            <div>
              <p>FatherName :</p>
              <p id="rfathername">dfsfsaf</p>
            </div>
            <div>
              <p>MotherName :</p>
              <p id="rmothername">fsdfsd</p>
            </div>
          </div>
        </div>

        <!-- bottom section start  -->
        <div class="bottom">
          <button class="backbtn" disabled>back</button>
          <button class="nextbtn">next</button>
        </div>
        <!-- bottom section end  -->
      </div>
    </div>

    <script src="./script/multiform.js"></script>
  </body>
</html>
